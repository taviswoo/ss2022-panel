<!DOCTYPE html>
<html>
<head><title>初始化设置</title></head>
<body>
  <h2>首次使用，请填写配置</h2>
  <form method="post">
    <label>Telegram Bot Token:</label><br>
    <input type="text" name="BOT_TOKEN" required><br><br>
    <label>Telegram Chat ID:</label><br>
    <input type="text" name="CHAT_ID" required><br><br>
    <label>Web 管理密码:</label><br>
    <input type="password" name="ADMIN_PASSWORD" required><br><br>
    <button type="submit">保存</button>
  </form>
</body>
</html>
